@if (car$ | async; as car){
  <section class="car-details">
    <h2 class="car-title">{{ car.make }} {{ car.model }}</h2>

    <div class="car-info-card">
      @if (car.imageUrl) {
        <img class="car-details-image" [src]="car.imageUrl" [alt]="car.make + ' ' + car.model">
      } @else {
        <div class="car-details-avatar" aria-hidden="true">
          {{ car.make.charAt(0) || '?' }}
        </div>
      }
      <div class="car-info-row">
        <span class="label">Make</span>
        <span class="value">{{ car.make }}</span>
      </div>
      <div class="car-info-row">
        <span class="label">Model</span>
        <span class="value">{{ car.model }}</span>
      </div>
      <div class="car-info-row">
        <span class="label">Color</span>
        <span class="value">{{ car.color }}</span>
      </div>
      <div class="car-info-row">
        <span class="label">Year</span>
        <span class="value">{{ car.yearOfCar ?? car.year ?? '-' }}</span>
      </div>
    </div>

    <div class="car-actions">
      <button mat-raised-button color="accent" (click)="toggleEdit()">
        {{ isEditing ? 'Close Edit' : 'Edit Details' }}
      </button>
      <button mat-flat-button color="warn" (click)="deleteCar()">
        Delete
      </button>
    </div>

    @if (isEditing) {
      <app-car-form [car]="car"></app-car-form>
    }
  </section>
} @else {
  Loading car...
}
