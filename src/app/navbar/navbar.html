<nav class="navbar center">
  <span class="navbar-brand">Car Showcase</span>

  <div class="navbar-main">
    <a *ngIf="isAuthenticated$ | async" routerLink="/dashboard" routerLinkActive="active">Admin Dashboard</a>

    <form class="navbar-search" (ngSubmit)="onSearch()">
      <select [(ngModel)]="entity" name="entity">
        <option value="cars">Cars</option>
        <option *ngIf="isAuthenticated$ | async" value="users">Users</option>
      </select>
      <input
        type="search"
        name="query"
        [(ngModel)]="query"
        placeholder="Search by name, model, or ID"
      />
    </form>

    <a
      routerLink="/home"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Home
    </a>

    <a *ngIf="isAuthenticated$ | async" routerLink="/user-list" routerLinkActive="active">Users</a>
    <a *ngIf="isAuthenticated$ | async" routerLink="/userform" routerLinkActive="active">Register User</a>
    <a routerLink="/car-list" routerLinkActive="active">Cars</a>
    <a *ngIf="isAuthenticated$ | async" routerLink="/carform" routerLinkActive="active">Add Car</a>
    <a *ngIf="!(isAuthenticated$ | async)" routerLink="/login" routerLinkActive="active">Login</a>
  </div>

  <span class="navbar-placeholder" aria-hidden="true">Car Showcase</span>
</nav>
